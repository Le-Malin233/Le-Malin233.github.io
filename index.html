<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Le-Malin233 的个人主页</title>
  <style>
    :root {
      --primary: #333;
      --secondary: #6c63ff;
      --bg: #fafaff;
      --card-bg: #fff;
      --radius: 12px;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    body {
      background: var(--bg);
      color: var(--primary);
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft Yahei', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 680px;
      margin: 60px auto 0 auto;
      padding: 32px 24px 24px 24px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
    }
    h1 {
      font-size: 2.4rem;
      margin: 0 0 12px 0;
      color: var(--secondary);
      font-weight: 700;
      letter-spacing: 2px;
    }
    p {
      font-size: 1.1rem;
      margin: 0 0 20px 0;
      color: #444;
    }
    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      margin-bottom: 18px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      object-fit: cover;
    }
    .links {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 28px 0 0 0;
    }
    .links a {
      display: inline-block;
      padding: 9px 22px;
      border-radius: 7px;
      background: var(--secondary);
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }
    .links a:hover {
      background: #5548d8;
    }
    @media (max-width: 768px) {
      .container {
        margin-top: 22px;
        padding: 18px 6vw;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://avatars.githubusercontent.com/u/139576166?v=4" alt="avatar" class="avatar">
    <h1>Le-Malin233</h1>
    <p>你好！我是Le-Malin233，这里是我的个人主页。<br>
    欢迎来到我的个人空间！
    </p>
    <div class="links">
      <a href="https://github.com/Le-Malin233" target="_blank">GitHub</a>
      <!-- <a href="#">博客</a> -->
      <!-- <a href="#">联系我</a> -->
    </div>
  </div>
</body>
</html>
